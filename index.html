<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นายฐนดล</title>
    <style>
        body {
            background-color: #333333; /* ปรับพื้นหลังให้ดูโมเดิร์นขึ้น */
            color: #ffffff; /* เปลี่ยนสีตัวอักษรเป็นสีขาวให้ตัดกับพื้นหลัง */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; /* จัดเนื้อหาให้อยู่ตรงกลางเพื่อความสวยงาม */
            padding: 50px 20px;
        }
        img {
            width: 200px; /* จำกัดขนาดรูปโปรไฟล์ */
            height: 200px;
            border-radius: 50%; /* ปรับรูปภาพให้เป็นวงกลม */
            object-fit: cover;
            border: 4px solid #ffffff;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            color: #00ffff; /* สีลิงก์ */
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            padding: 8px 16px;
            border: 2px solid #00ffff;
            border-radius: 5px;
            transition: 0.3s;
        }
        a:hover {
            background-color: #00ffff;
            color: #333333;
        }
    </style>
</head>
<body>
